<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEDD — Menyelesaikan Login...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #060d1f;
            color: #e8f4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
            text-align: center;
            padding: 2rem;
        }
        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; }
        .logo span { color: #00e5ff; }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(0,229,255,0.2);
            border-top-color: #00e5ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #7aa8c8; font-size: 0.95rem; }
        .success { color: #00e676; font-size: 1rem; font-weight: 600; display: none; }
    </style>
</head>
<body>
    <div class="logo">Z<span>E</span>DD</div>
    <div class="spinner" id="spinner"></div>
    <p id="msg">Menyelesaikan login Google...</p>
    <p class="success" id="success-msg">✅ Login berhasil! Menutup tab ini...</p>

    <script>
        (function () {
            const params     = new URLSearchParams(window.location.search);
            const token      = params.get('session_token');
            const userName   = params.get('user_name');
            const userAvatar = params.get('user_avatar');

            if (!token) {
                document.getElementById('msg').textContent =
                    '❌ Gagal mendapatkan token. Silakan coba lagi.';
                document.getElementById('spinner').style.display = 'none';
                return;
            }

            // Kirim data ke window parent / opener
            const payload = {
                type:        'ZEDD_AUTH_SUCCESS',
                sessionToken: token,
                userName:    userName ? decodeURIComponent(userName)    : '',
                userAvatar:  userAvatar ? decodeURIComponent(userAvatar) : '',
            };

            // Coba kirim ke opener (popup) atau ke parent (iframe / tab yang sama origin)
            let sent = false;
            if (window.opener && !window.opener.closed) {
                try {
                    window.opener.postMessage(payload, '*');
                    sent = true;
                } catch (_) {}
            }

            if (!sent && window.parent !== window) {
                try {
                    window.parent.postMessage(payload, '*');
                    sent = true;
                } catch (_) {}
            }

            // Tampilkan pesan sukses
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('msg').style.display     = 'none';
            document.getElementById('success-msg').style.display = 'block';

            // Tutup popup setelah 1.2 detik
            setTimeout(() => {
                if (window.opener && !window.opener.closed) {
                    window.close();
                } else {
                    // Jika tidak bisa tutup (tab langsung), redirect ke halaman utama
                    window.location.href = './index.html?session_token=' + token
                        + '&user_name=' + (userName || '')
                        + '&user_avatar=' + (userAvatar || '');
                }
            }, 1200);
        })();
    </script>
</body>
</html>
